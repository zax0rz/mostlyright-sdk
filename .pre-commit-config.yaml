# Pre-commit hooks. Mandatory per CLAUDE.md. No `--no-verify`.
# Install: `uv run pre-commit install` (once per checkout)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=5000]  # parity fixture parquets can be larger than default 500KB

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest fast tests (no live)
        entry: uv run pytest -m "not live" -q
        language: system
        pass_filenames: false
        always_run: true
