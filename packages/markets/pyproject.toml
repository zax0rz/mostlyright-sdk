[project]
name = "tradewinds-markets"
version = "0.0.1"
description = "Prediction market data for tradewinds: Kalshi, Polymarket. v0.1.0 ships in Sprint 0.5 with Kalshi market metadata."
readme = "README.md"
license = { file = "../../LICENSE" }
authors = [{ name = "Robert Tarabcak", email = "tarabcakr@gmail.com" }]
requires-python = ">=3.11"
keywords = ["kalshi", "polymarket", "prediction-markets"]
classifiers = [
    "Development Status :: 1 - Planning",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "httpx>=0.27",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
parquet = [
    "pyarrow>=17.0",
    "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tradewinds"]
