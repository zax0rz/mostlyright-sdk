[project]
name = "tradewinds-markets"
version = "0.1.0rc1"
description = "Prediction market data for tradewinds: Kalshi (NHIGH/NLOW contract specs in v0.1.0rc1, market metadata in Sprint 0.5), Polymarket (Phase 3.3)."
readme = "README.md"
license = "MIT"
authors = [{ name = "Robert Tarabcak", email = "tarabcakr@gmail.com" }]
requires-python = ">=3.11"
keywords = ["kalshi", "polymarket", "prediction-markets"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    # PKG-03: pin tradewinds (core) so users cannot mix markets/core releases
    # across the canonical-schema boundary. The Kalshi resolvers use
    # tradewinds.markets.catalog (this package) but the wider settlement
    # pipeline reads tradewinds.core.* schemas; a stale core would silently
    # serve the wrong column set.
    "tradewinds>=0.1.0rc1,<0.2",
    "httpx>=0.27",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
# Mirrors the core `parquet` extra caps (PKG-05, PKG-06) so a future install
# cannot silently drift across the parity-critical pandas/pyarrow boundary.
parquet = [
    "pyarrow>=17.0,<24.0",
    "pandas>=2.2,<4.0",
]
# Phase 3.3: Polymarket discovery + settlement. polymarket_discover()
# returns a DataFrame (pandas required); polymarket_settle() calls
# daily_extremes() which imports tradewinds.weather.cache (sibling
# weather package required). Codex iter-1 P2: without these the
# polymarket_* public surface raises ModuleNotFoundError on every call.
# Users opt in via `pip install tradewinds-markets[polymarket]`.
polymarket = [
    "pandas>=2.2,<4.0",
    "tradewinds-weather>=0.1.0rc1,<0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tradewinds"]
