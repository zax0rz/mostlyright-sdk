[project]
name = "tradewinds-weather"
version = "0.0.1"
description = "Weather data sources for tradewinds: AWC, IEM, GHCNh, NWS CLI. Direct public-API access; no hosted backend."
readme = "README.md"
license = { file = "../../LICENSE" }
authors = [{ name = "Robert Tarabcak", email = "tarabcakr@gmail.com" }]
requires-python = ">=3.11"
keywords = ["weather", "metar", "awc", "iem", "ghcnh", "nws-cli"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    # Pinned to v0.14.1 mostlyright deps
    "httpx>=0.27",
    "jsonschema>=4.21",
    "tzdata; sys_platform == 'win32'",
    # Local parquet cache requires filelock for concurrent process safety
    "filelock>=3.12",
]

[project.optional-dependencies]
# DataFrame return + parquet read/write
parquet = [
    "pyarrow>=17.0",
    "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tradewinds"]
