<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>tradewinds smoke</title>
    <style>
      body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 320px; padding: 12px; }
      label { display: block; margin-top: 8px; font-weight: 600; }
      input { width: 100%; padding: 4px 6px; box-sizing: border-box; }
      button { margin-top: 12px; padding: 6px 12px; }
      pre { background: #f5f5f5; padding: 8px; max-height: 260px; overflow: auto; font-size: 11px; }
    </style>
  </head>
  <body>
    <h3 style="margin: 0">tradewinds TS-W1 smoke</h3>
    <label for="station">Station (3-letter NWS or 4-letter ICAO)</label>
    <input id="station" value="NYC" />
    <label for="from">From (YYYY-MM-DD)</label>
    <input id="from" type="date" />
    <label for="to">To (YYYY-MM-DD)</label>
    <input id="to" type="date" />
    <button id="go">Lookup</button>
    <pre id="out">(no result yet)</pre>
    <script src="popup.js" type="module"></script>
  </body>
</html>
